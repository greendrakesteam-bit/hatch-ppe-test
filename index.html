          )}
          <div style={{display:'flex', justifyContent:'space-between', padding:'1px 0'}}>
            <span style={{color:'var(--text2)'}}>Monthly Escrow <span style={{color:'var(--text3)', fontSize:10}}>(est.)</span></span>
            <span style={{fontStyle:'italic'}}>{fmtC(summary.monthly_escrow)}</span>
          </div>
          <div style={{display:'flex', justifyContent:'space-between', padding:'3px 0', fontWeight:700, borderTop:'1px solid var(--border)', marginTop:3, fontSize:13}}>
            <span>Total Monthly</span>
            <span>{fmtC(summary.total_monthly)}</span>
          </div>
        </div>
      </div>
    </div>
  );
}

function ProductGroup({ group, showAll, onToggle, loanAmount, scenario, displayOpts }) {
  const first = group[0];
  const parRate = group.find(r => r.is_par_rate);
  const sorted = [...group].sort((a, b) => a.pricing.base_rate_percent - b.pricing.base_rate_percent);
  const displayed = showAll ? sorted : sorted.slice(0, 7);
  const hasMore = sorted.length > 7;

  const [expanded, setExpanded] = useState(true);
  const [showLLPA, setShowLLPA] = useState(false);
  const [selectedRateIdx, setSelectedRateIdx] = useState(null); // index into sorted array

  // Which rate to show summary for: selected or par rate
  const summaryRate = selectedRateIdx !== null ? sorted[selectedRateIdx] : parRate;
  const summary = summaryRate && scenario ? calcLoanSummary(summaryRate, scenario, displayOpts) : null;

  return (
    <div className="product-group">
      <div className="product-header" onClick={() => setExpanded(!expanded)}>
        <div>
          <span className="product-title">{first.product_code}</span>
          <span style={{color:'var(--text3)', fontSize:12, marginLeft:8}}>{first.product_name}</span>
        </div>
        <div className="product-badges">
          <span className="product-category">{first.product_category}</span>
          <span style={{fontSize:11, color:'var(--text3)'}}>{group.length} rates</span>
          <span style={{fontSize:14, color:'var(--text3)'}}>{expanded ? '▾' : '▸'}</span>
        </div>
      </div>

      {expanded && (
        <>
          {parRate && (
            <div style={{padding:'4px 16px 8px'}}>
              <div className="par-highlight">
                <span className="rate">{parRate.pricing.base_rate_percent.toFixed(3)}%</span>
                <span className="detail">par rate</span>
                <span className="detail">|</span>
                <span className="detail">${parRate.pricing.monthly_pi.toLocaleString()}/mo P&I</span>
                {parRate.pricing.government_insurance?.type !== "none" && parRate.pricing.government_insurance?.monthly_amount > 0 && (
                  <>
                    <span className="detail">|</span>
                    <span className="detail" style={{color:'var(--orange)'}}>${parRate.pricing.total_monthly_payment.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2})}/mo total</span>
                  </>
                )}
                <span className="detail">|</span>
                <span className="detail">{parRate.pricing.apr.toFixed(4)}% APR</span>
                <span className="detail">|</span>
                <span className="detail">Price: {parRate.pricing.final_price_points.toFixed(4)}</span>
              </div>
            </div>
          )}

          <div className="comp-display">
            Comp: ${first.pricing.comp_dollars.toFixed(0)} ({first.pricing.comp_points.toFixed(3)} pts)
            {' · '}
            LLPA Total: {first.pricing.total_llpa_points >= 0 ? '+' : ''}{first.pricing.total_llpa_points.toFixed(4)} pts
            {first.llpa_breakdown.length > 0 && (
              <span style={{marginLeft:8, color:'var(--accent)', cursor:'pointer', fontSize:11}} onClick={(e) => { e.stopPropagation(); setShowLLPA(!showLLPA); }}>
                [{showLLPA ? 'hide' : 'show'} breakdown]
              </span>
            )}
          </div>

          {first.pricing.government_insurance && first.pricing.government_insurance.type !== "none" && (
            <div style={{padding:'4px 16px 8px', fontSize:12, color:'var(--text2)', background:'rgba(56,189,248,0.05)', borderBottom:'1px solid var(--bg3)'}}>
              <div style={{fontWeight:600, color:'var(--accent)', fontSize:11, textTransform:'uppercase', marginBottom:2}}>
                {first.pricing.government_insurance.type === "fha_mip" ? "FHA Mortgage Insurance"
                  : first.pricing.government_insurance.type === "va_funding_fee" ? "VA Funding Fee"
                  : first.pricing.government_insurance.type === "conventional_pmi" ? "Private Mortgage Insurance (PMI)"
                  : "Mortgage Insurance"}
              </div>
              <div style={{display:'flex', gap:16, flexWrap:'wrap'}}>
                {first.pricing.government_insurance.upfront_fee_amount > 0 && (
                  <span>
                    Upfront: {first.pricing.government_insurance.upfront_fee_percent.toFixed(2)}%
                    {' = '}${first.pricing.government_insurance.upfront_fee_amount.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2})}
                    {first.pricing.government_insurance.upfront_financed && <span style={{color:'var(--text3)'}}> (financed)</span>}
                  </span>
                )}
                {first.pricing.government_insurance.annual_rate_percent > 0 && (
                  <span>
                    {first.pricing.government_insurance.type === "conventional_pmi" ? "Annual PMI" : "Annual MIP"}: {first.pricing.government_insurance.annual_rate_percent.toFixed(2)}%
                    {' = '}${first.pricing.government_insurance.monthly_amount.toFixed(2)}/mo
                  </span>
                )}
                {first.pricing.government_insurance.duration_label && first.pricing.government_insurance.duration_label !== "N/A" && (
                  <span>Duration: {first.pricing.government_insurance.duration_label}</span>
                )}
                {first.pricing.government_insurance.upfront_financed && (
                  <span>Total Loan: ${first.pricing.total_loan_amount.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2})}</span>
                )}
              </div>
            </div>
          )}

          {summary && <LoanSummary summary={summary} />}

          {showLLPA && first.llpa_breakdown.length > 0 && (
            <div className="llpa-summary">
              {first.llpa_breakdown.map((l, i) => (
                <div className="llpa-detail" key={i}>
                  <span>{l.matrix_name}</span>
                  <span className={`llpa-value ${l.adjustment_points < 0 ? 'neg' : l.adjustment_points > 0 ? 'pos' : ''}`}>
                    {l.adjustment_points >= 0 ? '+' : ''}{l.adjustment_points.toFixed(4)}
                  </span>
                </div>
              ))}
              <div className="llpa-detail llpa-total">
                <span>Total</span>
                <span className={`llpa-value ${first.pricing.total_llpa_points < 0 ? 'neg' : 'pos'}`}>
                  {first.pricing.total_llpa_points >= 0 ? '+' : ''}{first.pricing.total_llpa_points.toFixed(4)}
                </span>
              </div>
            </div>
          )}

          <table className="rate-table">
            <thead>
              <tr>
                <th>Rate</th>
                <th>Base Price</th>
                <th>Final Price</th>
                <th>Monthly P&I</th>
                {first.pricing.government_insurance?.type !== "none" && first.pricing.government_insurance?.monthly_amount > 0 && <th>Total Payment</th>}
                <th>APR</th>
                <th>Points Cost</th>
                <th>Type</th>
              </tr>
            </thead>
            <tbody>
              {displayed.map((r, i) => {
                const pointsCost = ((100 - r.pricing.final_price_points) / 100) * r.pricing.final_price_points !== 100
                  ? ((100 - r.pricing.final_price_points) / 100 * r.pricing.base_rate_percent) : 0;
                const dollarCost = ((100 - r.pricing.final_price_points) / 100) * first.pricing.estimated_closing_costs / 0.015;
                const actualDollarCost = Math.round(((100 - r.pricing.final_price_points) / 100) * (r.pricing.monthly_pi * r.term_months / (r.pricing.base_rate_percent/100*12)) );
                // Simpler: discount points in dollars
                const dpDollars = Math.round(((100 - r.pricing.final_price_points) / 100) * (loanAmount || 350000));

                const sortedIdx = sorted.indexOf(r);
                const isSelected = selectedRateIdx === sortedIdx;

                return (
                  <tr key={i} className={r.is_par_rate ? 'par-row' : ''} onClick={() => setSelectedRateIdx(isSelected ? null : sortedIdx)}
                      style={{cursor:'pointer', outline: isSelected ? '1px solid var(--accent)' : 'none'}}>
                    <td style={{fontWeight: r.is_par_rate ? 700 : 400}}>
                      {r.pricing.base_rate_percent.toFixed(3)}%
                    </td>
                    <td>{r.pricing.base_price_points.toFixed(4)}</td>
                    <td style={{color: r.pricing.final_price_points < 99.9 ? 'var(--red)' : r.pricing.final_price_points > 100.1 ? 'var(--green)' : 'var(--text)'}}>
                      {r.pricing.final_price_points.toFixed(4)}
                    </td>
                    <td>${r.pricing.monthly_pi.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2})}</td>
                    {first.pricing.government_insurance?.type !== "none" && first.pricing.government_insurance?.monthly_amount > 0 && (
                      <td style={{fontWeight:600, color:'var(--orange)'}}>
                        ${r.pricing.total_monthly_payment.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2})}
                      </td>
                    )}
                    <td>{r.pricing.apr.toFixed(4)}%</td>
                    <td style={{color: dpDollars > 0 ? 'var(--red)' : dpDollars < 0 ? 'var(--green)' : 'var(--text2)'}}>
                      {dpDollars > 0 ? `-$${dpDollars.toLocaleString()}` : dpDollars < 0 ? `+$${Math.abs(dpDollars).toLocaleString()}` : '$0'}
                    </td>
                    <td>
                      {r.is_par_rate && <span className="par-badge">PAR</span>}
                      {r.rate_option === "below_par" && !r.is_par_rate && <span className="discount-badge">discount</span>}
                      {r.rate_option === "above_par" && <span className="credit-badge">credit</span>}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>

          {hasMore && !showAll && (
            <div className="show-more">
              <button onClick={onToggle}>Show all {sorted.length} rates</button>
            </div>
          )}
          {hasMore && showAll && (
            <div className="show-more">
              <button onClick={onToggle}>Show fewer</button>
            </div>
          )}
        </>
      )}
    </div>
  );
}

function App() {
  const [supabaseUrl, setSupabaseUrl] = useState('');
  const [supabaseKey, setSupabaseKey] = useState('');
  const [connected, setConnected] = useState(null); // null | true | false
  const [loading, setLoading] = useState(false);
  const [response, setResponse] = useState(null);
  const [expandedProducts, setExpandedProducts] = useState({});
  const clientRef = useRef(null);

  // Form state
  const [form, setForm] = useState({
    loan_amount: 350000,
    property_value: 500000,
    purchase_price: '',           // Purchase only — may differ from appraised value
    appraised_value: '',          // Appraised value — if provided with purchase_price, LTV uses min()
    fico_score: 740,
    purpose: 'purchase',
    property_type: 'single_family',
    occupancy: 'primary_residence',
    state_code: 'NC',
    county_name: '',              // County name (for conforming limits, AMI lookup)
    zip_code: '',                 // Property ZIP code
    dti_ratio: '',
    num_units: '',
    preferred_lock_days: 45,      // Will be auto-set by getDefaultLockDays
    preferred_term_months: 360,
    // Subordinate financing
    subordinate_lien_balance: '',   // Total balance of all junior liens ($)
    heloc_credit_limit: '',         // Full HELOC credit limit for HCLTV calc ($)
    // Scenario flags
    is_veteran: false,            // Veteran — required for VA product eligibility
    is_first_va_use: true,        // First time using VA benefit (only relevant if veteran)
    is_va_funding_fee_exempt: false,
    subordination: false,         // Refi with existing 2nd lien staying in place
    self_employed: false,         // Self-employed borrower
    is_first_time_buyer: false,   // First-time homebuyer
    is_ami_below_80: false,       // Borrower income ≤80% AMI → FNMA LLPA waiver on conventional
    is_ami_below_100: false,      // Borrower income ≤100% AMI → partial LLPA relief
    escrow_waiver: 'none',        // 'none' | 'partial' | 'full'
    // Pricing display options
    origination_fee: 1500,        // Lender origination / UW fee ($)
    fees_in: false,               // false = fees-out (fees shown separately), true = fees baked into rate/price
    escrow_annual_rate: 1.25,     // Annual escrow estimate as % of property value (taxes + insurance)
  });

  const updateForm = (field, value) => setForm(prev => ({...prev, [field]: value}));

  // --- Default Lock Period Logic ---
  // Priority: longest applicable lock wins.
  // 1. Refi + subordination → 60 days
  // 2. Condo → 60 days
  // 3. Purchase → 45 days
  // 4. Self-employed → 45 days
  // 5. All other → 30 days
  // Note: Non-QM 45-day minimum is applied per-product in the pricing engine, not here.
  function getDefaultLockDays(f) {
    let lockDays = 30; // base default
    // Purchase → 45 days
    if (f.purpose === 'purchase') lockDays = Math.max(lockDays, 45);
    // Self-employed → 45 days
    if (f.self_employed) lockDays = Math.max(lockDays, 45);
    // Condo → 60 days
    if (f.property_type === 'condo') lockDays = Math.max(lockDays, 60);
    // Refi + subordination → 60 days
    const isRefi = f.purpose === 'rate_term_refi' || f.purpose === 'cash_out_refi';
    if (isRefi && f.subordination) lockDays = Math.max(lockDays, 60);
    return lockDays;
  }

  // Auto-update lock period when relevant fields change
  useEffect(() => {
    const newLock = getDefaultLockDays(form);
    if (Number(form.preferred_lock_days) !== newLock) {
      setForm(prev => ({ ...prev, preferred_lock_days: newLock }));
    }
  }, [form.purpose, form.property_type, form.subordination, form.self_employed]);

  // Currency formatting helper
  const formatCurrency = (val) => {
    const num = Number(String(val).replace(/,/g, ''));
    if (isNaN(num) || num === 0) return '';
    return num.toLocaleString('en-US');
  };
  const parseCurrency = (val) => String(val).replace(/,/g, '');

  // Connect to Supabase
  const connect = useCallback(() => {
    if (!supabaseUrl || !supabaseKey) return;
    try {
      const client = supabase.createClient(supabaseUrl, supabaseKey);
      clientRef.current = client;
      // Test connection
      client.from("investors").select("id").limit(1).then(({error}) => {
        setConnected(error ? false : true);
      });
    } catch (err) {
      console.error("Connection error:", err);
      setConnected(false);
    }
  }, [supabaseUrl, supabaseKey]);

  // Run pricing
  const runPrice = useCallback(async () => {
    if (!clientRef.current) return;

    const scenario = {
      ...form,
      loan_amount: Number(form.loan_amount),
      property_value: Number(form.property_value),
      purchase_price: form.purchase_price ? Number(form.purchase_price) : undefined,
      appraised_value: form.appraised_value ? Number(form.appraised_value) : undefined,
      fico_score: Number(form.fico_score),
      preferred_lock_days: Number(form.preferred_lock_days),
      preferred_term_months: Number(form.preferred_term_months),
      dti_ratio: form.dti_ratio ? Number(form.dti_ratio) : undefined,
      num_units: form.num_units ? Number(form.num_units) : undefined,
      subordinate_lien_balance: form.subordinate_lien_balance ? Number(form.subordinate_lien_balance) : undefined,
      heloc_credit_limit: form.heloc_credit_limit ? Number(form.heloc_credit_limit) : undefined,
      county_name: form.county_name || undefined,
      zip_code: form.zip_code || undefined,
      escrow_waiver: form.escrow_waiver || 'none',
      is_first_va_use: form.is_first_va_use,
      is_va_funding_fee_exempt: form.is_va_funding_fee_exempt,
    };

    const { errors, resolved } = validateAndResolve(scenario);
    if (errors.length) {
      setResponse({ errors, results: [], meta: {} });
      return;
    }

    setLoading(true);
    setResponse(null);
    try {
      const res = await runPricing(clientRef.current, resolved);
      setResponse(res);
    } catch (e) {
      setResponse({ errors: [e.message], results: [], meta: {} });
    }
    setLoading(false);
  }, [form]);

  // Group results by product
  const eligibleGroups = [];
  const ineligibleResults = [];
  if (response?.results) {
    const gmap = new Map();
    for (const r of response.results) {
      if (r.eligibility.is_eligible && r.pricing) {
        const k = `${r.investor_code}::${r.product_code}`;
        if (!gmap.has(k)) gmap.set(k, []);
        gmap.get(k).push(r);
      } else if (!r.eligibility.is_eligible) {
        ineligibleResults.push(r);
      }
    }
    // Sort groups by best APR in each group
    for (const [k, group] of gmap) {
      const bestApr = Math.min(...group.map(r => r.pricing.apr));
      eligibleGroups.push({ key: k, group, bestApr });
    }
    eligibleGroups.sort((a, b) => a.bestApr - b.bestApr);
  }

  // Dedupe ineligible by product code
  const ineligibleDeduped = [];
  const seen = new Set();
  for (const r of ineligibleResults) {
    if (!seen.has(r.product_code)) {
      seen.add(r.product_code);
      ineligibleDeduped.push(r);
    }
  }

  return (
    <div className="app">
      <div className="header">
        <h1>Hatch PPE — Pricing Test Tool</h1>
        <div className="meta">v1.0 · Planet Home Lending data loaded</div>
      </div>

      <div className="conn-bar">
        <label>Supabase URL:</label>
        <input value={supabaseUrl} onChange={e => setSupabaseUrl(e.target.value)} placeholder="https://xxxxx.supabase.co" />
        <label>Key:</label>
        <input type="password" value={supabaseKey} onChange={e => setSupabaseKey(e.target.value)} placeholder="service_role key" />
        <button className="btn" style={{background:'var(--bg3)', color:'var(--text)', padding:'4px 12px', fontSize:12}} onClick={connect}>
          Connect
        </button>
        {connected === true && <span className="conn-status ok">Connected</span>}
        {connected === false && <span className="conn-status err">Failed</span>}
      </div>

      <div className="main">
        <div className="panel-left">
          <div className="form-section">
            <h3>Loan Details</h3>
            <div className="form-row">
              <div className="form-group">
                <label>Loan Amount</label>
                <input type="text" value={formatCurrency(form.loan_amount)} onChange={e => updateForm('loan_amount', parseCurrency(e.target.value))} />
              </div>
              <div className="form-group">
                <label>{form.purpose === 'purchase' ? 'Purchase Price' : 'Property Value'}</label>
                <input type="text" value={formatCurrency(form.property_value)} onChange={e => updateForm('property_value', parseCurrency(e.target.value))} />
              </div>
            </div>
            {form.purpose === 'purchase' && (
              <div className="form-row">
                <div className="form-group">
                  <label>Appraised Value <span style={{fontSize:10, color:'var(--text3)'}}>(if different)</span></label>
                  <input type="text" value={form.appraised_value ? formatCurrency(form.appraised_value) : ''} onChange={e => updateForm('appraised_value', parseCurrency(e.target.value) || '')} placeholder="Same as purchase price" />
                </div>
              </div>
            )}
            <div className="form-row">
              <div className="form-group">
                <label>FICO Score</label>
                <input type="number" value={form.fico_score} onChange={e => updateForm('fico_score', e.target.value)} />
              </div>
              <div className="form-group">
                <label>DTI % (optional)</label>
                <input type="number" value={form.dti_ratio} onChange={e => updateForm('dti_ratio', e.target.value)} placeholder="e.g. 38" />
              </div>
            </div>
            <div className="form-section" style={{margin:0, padding:'6px 0 0 0', border:'none'}}>
              <h4 style={{fontSize:11, color:'var(--text3)', margin:'0 0 4px 0'}}>Subordinate Financing</h4>
              <div className="form-row">
                <div className="form-group">
                  <label>Sub. Lien Balance ($)</label>
                  <input type="text" value={form.subordinate_lien_balance ? formatCurrency(form.subordinate_lien_balance) : ''} onChange={e => updateForm('subordinate_lien_balance', parseCurrency(e.target.value) || '')} placeholder="0" />
                </div>
                <div className="form-group">
                  <label>HELOC Credit Limit ($)</label>
                  <input type="text" value={form.heloc_credit_limit ? formatCurrency(form.heloc_credit_limit) : ''} onChange={e => updateForm('heloc_credit_limit', parseCurrency(e.target.value) || '')} placeholder="0 (full line)" />
                </div>
              </div>
            </div>
            {(() => {
              const pv = Number(form.property_value) || 0;
              const la = Number(form.loan_amount) || 0;
              const appr = Number(form.appraised_value) || 0;
              const effPV = (form.purpose === 'purchase' && appr > 0) ? Math.min(pv, appr) : pv;
              const subBal = Number(form.subordinate_lien_balance) || 0;
              const helocLimit = Number(form.heloc_credit_limit) || 0;
              const unfundedHeloc = Math.max(0, helocLimit - subBal);
              const ltv = effPV > 0 ? Math.floor((la / effPV) * 10000) / 100 : 0;
              const cltv = effPV > 0 ? Math.floor(((la + subBal) / effPV) * 10000) / 100 : 0;
              const hcltv = effPV > 0 ? Math.floor(((la + subBal + unfundedHeloc) / effPV) * 10000) / 100 : 0;
              const showCltv = subBal > 0 || helocLimit > 0;
              return (
                <div className="form-row" style={{marginTop:4}}>
                  <div className="form-group" style={{flex: showCltv ? 1 : 2}}>
                    <label>LTV</label>
                    <input readOnly value={effPV > 0 ? ltv.toFixed(2) + '%' : '--'} style={{color:'var(--accent)', fontWeight:600}} />
                    {form.purpose === 'purchase' && appr > 0 && appr !== pv && (
                      <div style={{fontSize:9, color:'var(--text3)'}}>Using min(price, appraisal) = ${effPV.toLocaleString()}</div>
                    )}
                  </div>
                  {showCltv && (
                    <div className="form-group">
                      <label>CLTV</label>
                      <input readOnly value={cltv.toFixed(2) + '%'} style={{color:'var(--accent)', fontWeight:600}} />
                    </div>
                  )}
                  {showCltv && helocLimit > 0 && (
                    <div className="form-group">
                      <label>HCLTV</label>
                      <input readOnly value={hcltv.toFixed(2) + '%'} style={{color:'var(--accent)', fontWeight:600}} />
                    </div>
                  )}
                </div>
              );
            })()}
          </div>

          <div className="form-section">
            <h3>Loan Purpose & Property</h3>
            <div className="form-row">
              <div className="form-group">
                <label>Purpose</label>
                <select value={form.purpose} onChange={e => updateForm('purpose', e.target.value)}>
                  <option value="purchase">Purchase</option>
                  <option value="rate_term_refi">Rate/Term Refi</option>
                  <option value="cash_out_refi">Cash-Out Refi</option>
                  <option value="heloc">HELOC</option>
                  <option value="heloan">HELOAN</option>
                </select>
              </div>
            </div>
            <div className="form-row">
              <div className="form-group">
                <label>Property Type</label>
                <select value={form.property_type} onChange={e => updateForm('property_type', e.target.value)}>
                  <option value="single_family">Single Family</option>
                  <option value="condo">Condo</option>
                  <option value="townhome">Townhome</option>
                  <option value="multi_unit_2">2-Unit</option>
                  <option value="multi_unit_3">3-Unit</option>
                  <option value="multi_unit_4">4-Unit</option>
                  <option value="manufactured_home">Manufactured</option>
                  <option value="pud">PUD</option>
                </select>
              </div>
              <div className="form-group">
                <label>Occupancy</label>
                <select value={form.occupancy} onChange={e => updateForm('occupancy', e.target.value)}>
                  <option value="primary_residence">Primary</option>
                  <option value="secondary_residence">Second Home</option>
                  <option value="investment_property">Investment</option>
                </select>
              </div>
            </div>
            <div className="form-row">
              <div className="form-group">
                <label>State</label>
                <input value={form.state_code} onChange={e => updateForm('state_code', e.target.value.toUpperCase())} maxLength={2} placeholder="NC" />
              </div>
              <div className="form-group">
                <label>County</label>
                <input value={form.county_name} onChange={e => updateForm('county_name', e.target.value)} placeholder="e.g. Wake" />
              </div>
              <div className="form-group">
                <label>ZIP</label>
                <input value={form.zip_code} onChange={e => updateForm('zip_code', e.target.value)} maxLength={10} placeholder="27601" />
              </div>
            </div>
            <div className="form-row">
              <div className="form-group">
                <label>Units (if multi)</label>
                <input type="number" value={form.num_units} onChange={e => updateForm('num_units', e.target.value)} placeholder="1" />
              </div>
            </div>
          </div>

          <div className="form-section">
            <h3>Rate Options</h3>
            <div className="form-row">
              <div className="form-group">
                <label>Lock Period (days)</label>
                <select value={form.preferred_lock_days} onChange={e => updateForm('preferred_lock_days', Number(e.target.value))}>
                  <option value={15}>15</option>
                  <option value={30}>30</option>
                  <option value={45}>45</option>
                  <option value={60}>60</option>
                </select>
                {(() => {
                  const autoLock = getDefaultLockDays(form);
                  const reasons = [];
                  if ((form.purpose === 'rate_term_refi' || form.purpose === 'cash_out_refi') && form.subordination) reasons.push('subordination');
                  if (form.property_type === 'condo') reasons.push('condo');
                  if (form.purpose === 'purchase') reasons.push('purchase');
                  if (form.self_employed) reasons.push('self-employed');
                  if (reasons.length > 0) {
                    return <div style={{fontSize:10, color:'var(--accent)', marginTop:2}}>Auto: {autoLock}d ({reasons.join(', ')})</div>;
                  }
                  return null;
                })()}
              </div>
              <div className="form-group">
                <label>Term</label>
                <select value={form.preferred_term_months} onChange={e => updateForm('preferred_term_months', e.target.value)}>
                  <option value={360}>30-year</option>
                  <option value={300}>25-year</option>
                  <option value={240}>20-year</option>
                  <option value={180}>15-year</option>
                  <option value={120}>10-year</option>
                </select>
              </div>
            </div>
          </div>

          <div className="form-section">
            <h3>Pricing Display</h3>
            <div className="form-row">
              <div className="form-group">
                <label>Origination Fee ($)</label>
                <input type="text" value={formatCurrency(form.origination_fee)} onChange={e => updateForm('origination_fee', parseCurrency(e.target.value))} />
              </div>
              <div className="form-group">
                <label>Escrow Rate (% of value)</label>
                <input type="number" step="0.25" value={form.escrow_annual_rate} onChange={e => updateForm('escrow_annual_rate', e.target.value)} />
              </div>
            </div>
            <div className="form-row">
              <div className="form-group">
                <label style={{display:'flex', alignItems:'center', gap:6}}>
                  <input type="checkbox" checked={form.fees_in} onChange={e => updateForm('fees_in', e.target.checked)} style={{width:'auto'}} />
                  Fees-In Pricing
                </label>
                <div style={{fontSize:10, color:'var(--text3)', marginTop:2}}>
                  {form.fees_in ? 'Origination fee baked into rate/price. No separate fee line.' : 'Origination fee shown as separate lender cost.'}
                </div>
              </div>
            </div>
          </div>

          <div className="form-section">
            <h3>Scenario Flags</h3>
            <div className="form-row">
              <div className="form-group">
                <label style={{display:'flex', alignItems:'center', gap:6}}>
                  <input type="checkbox" checked={form.self_employed} onChange={e => updateForm('self_employed', e.target.checked)} style={{width:'auto'}} />
                  Self-Employed
                </label>
              </div>
              <div className="form-group">
                <label style={{display:'flex', alignItems:'center', gap:6}}>
                  <input type="checkbox" checked={form.is_first_time_buyer} onChange={e => updateForm('is_first_time_buyer', e.target.checked)} style={{width:'auto'}} />
                  First-Time Homebuyer
                </label>
              </div>
            </div>
            <div className="form-row">
              <div className="form-group">
                <label style={{display:'flex', alignItems:'center', gap:6}}>
                  <input type="checkbox" checked={form.is_ami_below_80} onChange={e => { updateForm('is_ami_below_80', e.target.checked); if(e.target.checked) updateForm('is_ami_below_100', true); }} style={{width:'auto'}} />
                  AMI ≤80%
                </label>
              </div>
              <div className="form-group">
                <label style={{display:'flex', alignItems:'center', gap:6}}>
                  <input type="checkbox" checked={form.is_ami_below_100} onChange={e => { updateForm('is_ami_below_100', e.target.checked); if(!e.target.checked) updateForm('is_ami_below_80', false); }} style={{width:'auto'}} />
                  AMI ≤100%
                </label>
              </div>
            </div>
            <div className="form-row">
              <div className="form-group">
                <label style={{display:'flex', alignItems:'center', gap:6}}>
                  <input type="checkbox" checked={form.is_veteran} onChange={e => updateForm('is_veteran', e.target.checked)} style={{width:'auto'}} />
                  Veteran
                </label>
              </div>
              <div className="form-group">
                <label>Escrow Waiver</label>
                <select value={form.escrow_waiver} onChange={e => updateForm('escrow_waiver', e.target.value)} style={{fontSize:12}}>
                  <option value="none">None (impounds)</option>
                  <option value="partial">Partial waiver</option>
                  <option value="full">Full waiver</option>
                </select>
              </div>
            </div>
            <div className="form-row">
              {(form.purpose === 'rate_term_refi' || form.purpose === 'cash_out_refi') && (
                <div className="form-group">
                  <label style={{display:'flex', alignItems:'center', gap:6}}>
                    <input type="checkbox" checked={form.subordination} onChange={e => updateForm('subordination', e.target.checked)} style={{width:'auto'}} />
                    Subordination
                  </label>
                </div>
              )}
            </div>
            <div style={{fontSize:10, color:'var(--text3)', marginTop:2}}>
              {form.is_ami_below_80 ? 'AMI ≤80%: FNMA primary LLPA waiver on conventional (purchase/refi, primary res). ' : ''}
              {form.is_ami_below_100 && !form.is_ami_below_80 ? 'AMI ≤100%: partial LLPA relief on conventional. ' : ''}
              {form.is_first_time_buyer ? 'First-time homebuyer flagged. ' : ''}
              {form.self_employed ? 'Self-employed: lock defaults to 45+ days. ' : ''}
              {form.is_veteran ? 'Veteran: VA products eligible. ' : ''}
              {form.subordination ? 'Subordination: lock defaults to 60 days. ' : ''}
              {form.escrow_waiver !== 'none' ? `Escrow ${form.escrow_waiver} waiver: LLPA adjustment may apply. ` : ''}
            </div>
          </div>

          {form.is_veteran && (
            <div className="form-section">
              <h3>VA Options</h3>
              <div className="form-row">
                <div className="form-group">
                  <label style={{display:'flex', alignItems:'center', gap:6}}>
                    <input type="checkbox" checked={form.is_first_va_use} onChange={e => updateForm('is_first_va_use', e.target.checked)} style={{width:'auto'}} />
                    First VA Use
                  </label>
                </div>
                <div className="form-group">
                  <label style={{display:'flex', alignItems:'center', gap:6}}>
                    <input type="checkbox" checked={form.is_va_funding_fee_exempt} onChange={e => updateForm('is_va_funding_fee_exempt', e.target.checked)} style={{width:'auto'}} />
                    Funding Fee Exempt
                  </label>
                </div>
              </div>
              <div style={{fontSize:10, color:'var(--text3)', marginTop:2}}>
                First VA Use: lower funding fee for first-time benefit users. Exempt: disability, surviving spouse, Purple Heart.
              </div>
            </div>
          )}

          <button className="btn btn-primary" onClick={runPrice} disabled={!connected || loading}>
            {loading ? 'Pricing...' : 'Run Pricing Engine'}
          </button>
        </div>

        <div className="panel-right">
          {!response && !loading && (
            <div className="empty-state">
              <h2>Hatch PPE</h2>
              <p>Connect to Supabase and enter a loan scenario to see pricing results.</p>
              <p style={{marginTop:16, fontSize:12, color:'var(--text3)'}}>
                Queries all investors with active rate sheets. Currently loaded: Planet Home Lending (correspondent).
              </p>
            </div>
          )}

          {loading && (
            <div className="loading">
              <div className="spinner"></div>
              <div>Running pricing engine...</div>
            </div>
          )}

          {response && !loading && (
            <>
              <div className="exec-bar">
                <div className="exec-stat"><span className="label">Time: </span><span className="value">{response.meta.execution_ms}ms</span></div>
                <div className="exec-stat"><span className="label">Investors: </span><span className="value">{response.meta.investors_queried}</span></div>
                <div className="exec-stat"><span className="label">Rate Options: </span><span className="value">{response.meta.total_rate_options}</span></div>
                <div className="exec-stat"><span className="label">Products Eligible: </span><span className="value" style={{color:'var(--green)'}}>{response.meta.products_eligible}</span></div>
                <div className="exec-stat"><span className="label">Ineligible: </span><span className="value" style={{color:'var(--red)'}}>{response.meta.products_ineligible}</span></div>
              </div>

              {response.errors?.length > 0 && (
                <div className="warnings">
                  <h4>Warnings / Notes ({response.errors.length})</h4>
                  <ul>{response.errors.map((e, i) => <li key={i}>{e}</li>)}</ul>
                </div>
              )}

              {eligibleGroups.length === 0 && ineligibleDeduped.length === 0 && (
                <div className="empty-state">
                  <h2>No Results</h2>
                  <p>No products matched this scenario. Check warnings above.</p>
                </div>
              )}

              {eligibleGroups.map(({ key, group }) => (
                <ProductGroup
                  key={key}
                  group={group}
                  showAll={expandedProducts[key] || false}
                  onToggle={() => setExpandedProducts(prev => ({...prev, [key]: !prev[key]}))}
                  loanAmount={Number(form.loan_amount)}
                  scenario={{
                    loan_amount: Number(form.loan_amount),
                    property_value: Number(form.property_value),
                    purpose: form.purpose,
                  }}
                  displayOpts={{
                    fees_in: form.fees_in,
                    origination_fee: Number(form.origination_fee) || 0,
                    escrow_annual_rate: Number(form.escrow_annual_rate) || 1.25,
                  }}
                />
              ))}

              {ineligibleDeduped.length > 0 && (
                <>
                  <div style={{fontSize:12, color:'var(--text3)', margin:'16px 0 8px', textTransform:'uppercase', letterSpacing:'0.05em'}}>
                    Ineligible Products ({ineligibleDeduped.length})
                  </div>
                  {ineligibleDeduped.map((r, i) => (
                    <div className="ineligible-group" key={i}>
                      <span className="ineligible-title">{r.product_code}</span>
                      <span style={{fontSize:12, color:'var(--text3)', marginLeft:8}}>{r.product_name}</span>
                      {r.eligibility.knockout_reasons.map((reason, j) => (
                        <div className="knockout-reason" key={j}>• {reason}</div>
                      ))}
                    </div>
                  ))}
                </>
              )}
            </>
          )}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><App /></ErrorBoundary>);
</script>
</body>
</html>
