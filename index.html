<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hatch PPE — Pricing Test Tool</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0f172a; --bg2: #1e293b; --bg3: #334155;
    --text: #e2e8f0; --text2: #94a3b8; --text3: #64748b;
    --accent: #38bdf8; --accent2: #0ea5e9;
    --green: #22c55e; --red: #ef4444; --yellow: #eab308; --orange: #f97316;
    --border: #475569;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; }

  .app { display: flex; flex-direction: column; height: 100vh; }

  /* Header */
  .header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; }
  .header h1 { font-size: 18px; font-weight: 600; color: var(--accent); }
  .header .meta { font-size: 12px; color: var(--text3); }

  /* Connection bar */
  .conn-bar { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 8px 24px; display: flex; gap: 12px; align-items: center; }
  .conn-bar label { font-size: 12px; color: var(--text2); white-space: nowrap; }
  .conn-bar input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 4px 8px; color: var(--text); font-size: 12px; font-family: monospace; }
  .conn-bar input:focus { outline: none; border-color: var(--accent); }
  .conn-status { font-size: 11px; padding: 2px 8px; border-radius: 10px; }
  .conn-status.ok { background: rgba(34,197,94,0.2); color: var(--green); }
  .conn-status.err { background: rgba(239,68,68,0.2); color: var(--red); }

  /* Main layout */
  .main { display: flex; flex: 1; overflow: hidden; }

  /* Left panel - form */
  .panel-left { width: 340px; min-width: 340px; border-right: 1px solid var(--border); overflow-y: auto; padding: 16px; background: var(--bg2); }
  .form-section { margin-bottom: 16px; }
  .form-section h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--accent); margin-bottom: 8px; font-weight: 600; }
  .form-row { display: flex; gap: 8px; margin-bottom: 6px; }
  .form-group { flex: 1; }
  .form-group label { display: block; font-size: 11px; color: var(--text2); margin-bottom: 2px; }
  .form-group input, .form-group select { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 6px 8px; color: var(--text); font-size: 13px; }
  .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--accent); }
  .form-group select { cursor: pointer; }

  .btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; transition: all 0.15s; }
  .btn-primary { background: var(--accent2); color: white; width: 100%; margin-top: 8px; }
  .btn-primary:hover { background: var(--accent); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Right panel - results */
  .panel-right { flex: 1; overflow-y: auto; padding: 16px 24px; }

  /* Execution bar */
  .exec-bar { background: var(--bg2); border-radius: 8px; padding: 10px 16px; margin-bottom: 16px; display: flex; gap: 24px; flex-wrap: wrap; }
  .exec-stat { font-size: 12px; }
  .exec-stat .label { color: var(--text3); }
  .exec-stat .value { color: var(--text); font-weight: 600; }

  /* Product group */
  .product-group { background: var(--bg2); border-radius: 8px; margin-bottom: 12px; overflow: hidden; border: 1px solid var(--bg3); }
  .product-header { padding: 10px 16px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
  .product-header:hover { background: var(--bg3); }
  .product-title { font-size: 14px; font-weight: 600; }
  .product-category { font-size: 11px; color: var(--text3); background: var(--bg); padding: 2px 8px; border-radius: 4px; text-transform: uppercase; }
  .product-badges { display: flex; gap: 8px; align-items: center; }

  /* LLPA summary */
  .llpa-summary { padding: 0 16px 8px; font-size: 12px; color: var(--text2); border-bottom: 1px solid var(--bg3); }
  .llpa-detail { display: flex; justify-content: space-between; padding: 1px 0; }
  .llpa-value { font-family: monospace; }
  .llpa-value.neg { color: var(--red); }
  .llpa-value.pos { color: var(--green); }
  .llpa-total { font-weight: 600; border-top: 1px solid var(--bg3); margin-top: 2px; padding-top: 2px; }

  /* Rate table */
  .rate-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .rate-table th { text-align: left; padding: 6px 10px; color: var(--text3); font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: 0.03em; border-bottom: 1px solid var(--bg3); }
  .rate-table td { padding: 5px 10px; font-family: monospace; font-size: 12px; border-bottom: 1px solid rgba(51,65,85,0.5); }
  .rate-table tr:hover td { background: rgba(56,189,248,0.05); }
  .rate-table tr.par-row td { background: rgba(34,197,94,0.08); }
  .rate-table tr.par-row:hover td { background: rgba(34,197,94,0.12); }

  .par-badge { font-size: 10px; background: rgba(34,197,94,0.2); color: var(--green); padding: 1px 6px; border-radius: 3px; font-weight: 600; }
  .discount-badge { font-size: 10px; background: rgba(239,68,68,0.15); color: var(--red); padding: 1px 6px; border-radius: 3px; }
  .credit-badge { font-size: 10px; background: rgba(34,197,94,0.15); color: var(--green); padding: 1px 6px; border-radius: 3px; }

  /* Ineligible */
  .ineligible-group { background: var(--bg2); border-radius: 8px; margin-bottom: 8px; padding: 10px 16px; border: 1px solid rgba(239,68,68,0.3); }
  .ineligible-title { font-size: 13px; color: var(--red); font-weight: 600; }
  .knockout-reason { font-size: 12px; color: var(--text3); margin-left: 16px; }

  /* Warnings */
  .warnings { background: rgba(234,179,8,0.1); border: 1px solid rgba(234,179,8,0.3); border-radius: 8px; padding: 10px 16px; margin-bottom: 12px; }
  .warnings h4 { font-size: 12px; color: var(--yellow); margin-bottom: 4px; }
  .warnings li { font-size: 12px; color: var(--text2); margin-left: 16px; }

  /* Empty state */
  .empty-state { text-align: center; padding: 60px 24px; color: var(--text3); }
  .empty-state h2 { font-size: 20px; margin-bottom: 8px; color: var(--text2); }
  .empty-state p { font-size: 14px; }

  /* Loading */
  .loading { text-align: center; padding: 40px; color: var(--accent); }
  .spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid var(--bg3); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Par rate highlight row */
  .par-highlight { display: inline-flex; align-items: center; gap: 6px; background: rgba(34,197,94,0.1); padding: 4px 12px; border-radius: 6px; margin-bottom: 8px; font-size: 13px; }
  .par-highlight .rate { font-weight: 700; color: var(--green); font-size: 15px; }
  .par-highlight .detail { color: var(--text2); font-size: 12px; }

  /* Comp display */
  .comp-display { font-size: 12px; color: var(--text3); padding: 4px 16px 6px; }

  /* Show more toggle */
  .show-more { text-align: center; padding: 6px; }
  .show-more button { background: none; border: 1px solid var(--border); color: var(--text2); padding: 3px 12px; border-radius: 4px; font-size: 11px; cursor: pointer; }
  .show-more button:hover { border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useCallback, useRef, useEffect, Component } = React;

// Error boundary to catch render errors and display them instead of blank screen
class ErrorBoundary extends Component {
  constructor(props) {
    super(props);
    this.state = { hasError: false, error: null };
  }
  static getDerivedStateFromError(error) {
    return { hasError: true, error };
  }
  componentDidCatch(error, info) {
    console.error("React Error:", error, info);
  }
  render() {
    if (this.state.hasError) {
      return React.createElement('div', {style:{padding:40,color:'#ef4444',background:'#1e293b',fontFamily:'monospace'}},
        React.createElement('h2', null, 'PPE UI Error'),
        React.createElement('pre', {style:{whiteSpace:'pre-wrap',marginTop:16}}, String(this.state.error)),
        React.createElement('button', {onClick:() => this.setState({hasError:false,error:null}), style:{marginTop:16,padding:'8px 16px',background:'#334155',color:'#e2e8f0',border:'none',borderRadius:4,cursor:'pointer'}}, 'Retry')
      );
    }
    return this.props.children;
  }
}

// =============================================
// PPE ENGINE — ported from TypeScript
// =============================================

// --- Validation ---
const VALID_PURPOSES = ["purchase","rate_term_refi","cash_out_refi","heloc","heloan"];
const VALID_PROPERTY_TYPES = ["single_family","condo","townhome","multi_unit_2","multi_unit_3","multi_unit_4","manufactured_home","pud"];
const VALID_OCCUPANCY = ["primary_residence","secondary_residence","investment_property"];

function validateAndResolve(scenario) {
  const errors = [];
  if (!scenario.loan_amount || scenario.loan_amount <= 0) errors.push("Loan amount required");
  if (!scenario.property_value || scenario.property_value <= 0) errors.push("Property value required");
  if (!scenario.fico_score || scenario.fico_score < 300 || scenario.fico_score > 850) errors.push("FICO must be 300-850");
  if (!VALID_PURPOSES.includes(scenario.purpose)) errors.push("Invalid purpose");
  if (!VALID_PROPERTY_TYPES.includes(scenario.property_type)) errors.push("Invalid property type");
  if (!VALID_OCCUPANCY.includes(scenario.occupancy)) errors.push("Invalid occupancy");
  if (!scenario.state_code || !/^[A-Z]{2}$/.test(scenario.state_code)) errors.push("State must be 2-letter code");
  if (errors.length) return { errors };

  // Resolve effective property value (purchase: min of price & appraisal)
  let effPV = scenario.property_value;
  if (scenario.purpose === 'purchase' && scenario.purchase_price && scenario.appraised_value) {
    effPV = Math.min(scenario.purchase_price, scenario.appraised_value);
  } else if (scenario.appraised_value) {
    effPV = scenario.appraised_value;
  }

  // LTV rounding: truncate to 2 decimal places (floor) — most common convention
  const rawLtv = (scenario.loan_amount / effPV) * 100;
  const ltv_ratio = Math.floor(rawLtv * 100) / 100;

  // CLTV: (loan + subordinate liens) / property value
  const subBal = scenario.subordinate_lien_balance || 0;
  const rawCltv = ((scenario.loan_amount + subBal) / effPV) * 100;
  const cltv_ratio = Math.floor(rawCltv * 100) / 100;

  // HCLTV: (loan + sub liens + unfunded HELOC) / property value
  const helocLimit = scenario.heloc_credit_limit || 0;
  const unfundedHeloc = Math.max(0, helocLimit - subBal);
  const rawHcltv = ((scenario.loan_amount + subBal + unfundedHeloc) / effPV) * 100;
  const hcltv_ratio = Math.floor(rawHcltv * 100) / 100;

  return {
    errors: [],
    resolved: {
      ...scenario,
      property_value: effPV,
      ltv_ratio,
      cltv_ratio,
      hcltv_ratio,
      lock_days: scenario.preferred_lock_days || 30,
      term_months: scenario.preferred_term_months || 360,
      amortization: "fixed",
    }
  };
}

// --- Eligibility ---
function checkEligibility(scenario, ip, productCategory) {
  const reasons = [];
  // VA products require veteran status
  if (productCategory === "va" && !scenario.is_veteran)
    reasons.push("VA products require veteran status");
  if (ip.min_fico != null && scenario.fico_score < ip.min_fico)
    reasons.push(`FICO ${scenario.fico_score} below minimum ${ip.min_fico}`);
  if (ip.max_ltv_ratio != null && scenario.ltv_ratio > ip.max_ltv_ratio)
    reasons.push(`LTV ${scenario.ltv_ratio.toFixed(2)}% exceeds max ${ip.max_ltv_ratio}%`);
  if (ip.max_cltv_ratio != null && scenario.cltv_ratio > ip.max_cltv_ratio)
    reasons.push(`CLTV ${scenario.cltv_ratio.toFixed(2)}% exceeds max ${ip.max_cltv_ratio}%`);
  if (ip.max_cltv_ratio != null && scenario.hcltv_ratio > ip.max_cltv_ratio)
    reasons.push(`HCLTV ${scenario.hcltv_ratio.toFixed(2)}% exceeds max ${ip.max_cltv_ratio}%`);
  if (ip.max_dti_ratio != null && scenario.dti_ratio != null && scenario.dti_ratio > ip.max_dti_ratio)
    reasons.push(`DTI ${scenario.dti_ratio.toFixed(1)}% exceeds max ${ip.max_dti_ratio}%`);
  if (ip.state_exclusions?.length > 0 && ip.state_exclusions.includes(scenario.state_code))
    reasons.push(`State ${scenario.state_code} excluded`);
  if (ip.state_availability?.length > 0 && !ip.state_availability.includes(scenario.state_code))
    reasons.push(`Not available in ${scenario.state_code}`);
  if (!ip.is_available) reasons.push("Product not available");
  return { is_eligible: reasons.length === 0, knockout_reasons: reasons };
}

// --- LLPA Engine ---
const PURPOSE_KEYWORDS = {
  purchase: ["Purchase Money", "Purchase"],
  rate_term_refi: ["Limited Cash-Out"],
  cash_out_refi: ["Cash-Out Refi", "Cash-Out"],
  heloc: [], heloan: [],
};
const ALL_PURPOSE_KW = ["Purchase Money","Purchase","Limited Cash-Out","Cash-Out Refi","Cash-Out"];

function matrixAppliesToPurpose(name, purpose) {
  const isPurposeSpecific = ALL_PURPOSE_KW.some(kw => name.includes(kw));
  if (!isPurposeSpecific) return true;
  const kws = PURPOSE_KEYWORDS[purpose] || [];
  if (kws.length === 0) return false;
  return kws.some(kw => name.includes(kw));
}

function extractFeature(name) { return name.split(" - ")[0].trim(); }

function featureApplies(feature, s) {
  if (feature === "ARM") return s.amortization === "arm";
  if (feature === "Condo") return s.property_type === "condo";
  if (feature === "Investment Property") return s.occupancy === "investment_property";
  if (feature === "Second Home") return s.occupancy === "secondary_residence";
  if (feature === "Manufactured Home") return s.property_type === "manufactured_home";
  if (feature === "Two- to four-unit property" || feature === "Multi Unit") return (s.num_units || 1) >= 2;
  if (feature === "DTI Ratio > 40%") return (s.dti_ratio || 0) > 40;
  if (feature === "DTI > 50") return (s.dti_ratio || 0) > 50;
  if (feature === "Interest Only") return s.amortization === "interest_only";
  if (feature === "Purchase") return s.purpose === "purchase";
  if (feature === "Florida Condo") return s.state_code === "FL" && s.property_type === "condo";
  if (feature === "Florida") return s.state_code === "FL";
  if (feature === "State Adjustments" || feature === "State") return true;
  if (feature.includes(",")) {
    const states = feature.split(",").map(st => st.trim().toUpperCase());
    return states.includes(s.state_code.toUpperCase());
  }
  if (feature === "High-balance fixed - rate" || feature === "High-balance ARM" ||
      feature === "Subordinate financing" || feature === "Escrow Waiver" ||
      feature === "Non - Warrantable Condo" || feature === "Prepay Penalty") return false;
  return false;
}

function valueInRange(val, min, max) {
  if (min !== null && min !== undefined && val < min) return false;
  if (max !== null && max !== undefined && val > max) return false;
  return true;
}

function lookup2D(entries, matrixId, fico, ltv) {
  for (const e of entries) {
    if (e.matrix_id !== matrixId) continue;
    if (valueInRange(fico, e.dimension_1_min, e.dimension_1_max) &&
        valueInRange(ltv, e.dimension_2_min, e.dimension_2_max)) return e;
  }
  return null;
}

function lookup1D(entries, matrixId, dimType, val) {
  for (const e of entries) {
    if (e.matrix_id !== matrixId) continue;
    if (e.dimension_1_exact_values?.length > 0) {
      const vs = String(val).toUpperCase();
      if (e.dimension_1_exact_values.some(v => v.toUpperCase() === vs)) return e;
    } else if (typeof val === "number") {
      if (valueInRange(val, e.dimension_1_min, e.dimension_1_max)) return e;
    }
  }
  return null;
}

function getDim1Value(dimType, s) {
  switch (dimType) {
    case "fico": return { value: s.fico_score, label: `FICO ${s.fico_score}` };
    case "ltv": return { value: s.ltv_ratio, label: `LTV ${s.ltv_ratio.toFixed(2)}%` };
    case "state": return { value: s.state_code, label: `State ${s.state_code}` };
    case "property_type": return { value: s.property_type, label: `Property ${s.property_type}` };
    case "dti": return { value: s.dti_ratio || 0, label: `DTI ${(s.dti_ratio||0).toFixed(1)}%` };
    case "loan_amount": return { value: s.loan_amount, label: `Loan $${s.loan_amount.toLocaleString()}` };
    case "occupancy": return { value: s.occupancy, label: `Occupancy ${s.occupancy}` };
    case "cltv": return { value: s.cltv_ratio, label: `CLTV ${s.cltv_ratio.toFixed(2)}%` };
    case "hcltv": return { value: s.hcltv_ratio, label: `HCLTV ${s.hcltv_ratio.toFixed(2)}%` };
    case "escrow_waiver": return { value: s.escrow_waiver || "none", label: `Escrow Waiver: ${s.escrow_waiver || "none"}` };
    case "num_units": return { value: s.num_units || 1, label: `Units: ${s.num_units || 1}` };
    case "purpose": return { value: s.purpose, label: `Purpose: ${s.purpose}` };
    default: return null;
  }
}

function applyLLPAs(matrices, entries, scenario, productCategory) {
  const details = [];
  let seq = 0;
  const applicable = matrices.filter(m => {
    if (!m.applies_to_product_categories?.includes(productCategory)) return false;
    return matrixAppliesToPurpose(m.name, scenario.purpose);
  });

  // FNMA AMI ≤80% LLPA Waiver: primary FICO/LTV matrix waived for
  // conventional, purchase or rate/term refi, primary residence
  const amiWaiverActive =
    scenario.is_ami_below_80 === true &&
    productCategory === "conventional" &&
    (scenario.purpose === "purchase" || scenario.purpose === "rate_term_refi") &&
    scenario.occupancy === "primary_residence";

  for (const m of applicable) {
    let matched = null, dimLabel = "";
    if (m.matrix_type === "primary_2d") {
      if (amiWaiverActive) {
        details.push({
          matrix_name: m.name,
          dimension_label: `AMI ≤80% WAIVER (FICO ${scenario.fico_score} × LTV ${scenario.ltv_ratio.toFixed(2)}%)`,
          adjustment_points: 0, sequence: seq++,
        });
        continue;
      }
      matched = lookup2D(entries, m.id, scenario.fico_score, scenario.ltv_ratio);
      dimLabel = `FICO ${scenario.fico_score} × LTV ${scenario.ltv_ratio.toFixed(2)}%`;
    } else if (m.matrix_type === "secondary_1d") {
      const feat = extractFeature(m.name);
      if (!featureApplies(feat, scenario)) continue;
      const dv = getDim1Value(m.dimension_1_type, scenario);
      if (!dv) continue;
      matched = lookup1D(entries, m.id, m.dimension_1_type, dv.value);
      dimLabel = dv.label;
    }
    if (matched) {
      details.push({
        matrix_name: m.name, dimension_label: dimLabel,
        adjustment_points: matched.adjustment_price_points || 0, sequence: seq++,
      });
    }
  }
  return { details, total_points: details.reduce((s, d) => s + d.adjustment_points, 0) };
}

// --- Government Insurance (FHA MIP / VA Funding Fee) ---
const FHA_CONFORMING_LIMIT = 524225;
const FHA_UFMIP_RATE = 0.0175;

function getFHAAnnualMIPRate(termMonths, ltvRatio, baseLoanAmount) {
  const isShortTerm = termMonths <= 180;
  const isHighBalance = baseLoanAmount > FHA_CONFORMING_LIMIT;
  if (isShortTerm) {
    return isHighBalance ? (ltvRatio <= 78 ? 0.15 : 0.65) : (ltvRatio <= 78 ? 0.15 : 0.40);
  } else {
    return isHighBalance ? (ltvRatio <= 90 ? 0.70 : 0.75) : (ltvRatio <= 90 ? 0.50 : 0.55);
  }
}

function calculateFHAMIP(baseLoanAmount, ltvRatio, termMonths) {
  const upfront_fee_percent = FHA_UFMIP_RATE * 100;
  const upfront_fee_amount = Math.round(baseLoanAmount * FHA_UFMIP_RATE * 100) / 100;
  const annual_rate_percent = getFHAAnnualMIPRate(termMonths, ltvRatio, baseLoanAmount);
  const totalLoanAmount = baseLoanAmount + upfront_fee_amount;
  const monthly_amount = Math.round((totalLoanAmount * (annual_rate_percent / 100)) / 12 * 100) / 100;
  const duration_months = ltvRatio <= 90 ? 132 : null;
  const duration_label = ltvRatio <= 90 ? "11 years" : "Life of loan";
  return {
    type: "fha_mip", upfront_fee_percent, upfront_fee_amount, upfront_financed: true,
    annual_rate_percent, monthly_amount, duration_months, duration_label,
  };
}

function calculateVAFundingFee(baseLoanAmount, propertyValue, purpose, isFirstUse, isExempt) {
  if (isExempt) {
    return {
      type: "va_funding_fee", upfront_fee_percent: 0, upfront_fee_amount: 0,
      upfront_financed: false, annual_rate_percent: 0, monthly_amount: 0,
      duration_months: 0, duration_label: "N/A (exempt)",
    };
  }
  const downPct = ((propertyValue - baseLoanAmount) / propertyValue) * 100;
  let feePct;
  if (purpose === "rate_term_refi") { feePct = 0.50; }
  else if (purpose === "cash_out_refi") { feePct = isFirstUse ? 2.15 : 3.30; }
  else {
    if (downPct >= 10) feePct = 1.25;
    else if (downPct >= 5) feePct = 1.50;
    else feePct = isFirstUse ? 2.15 : 3.30;
  }
  const upfront_fee_amount = Math.round(baseLoanAmount * (feePct / 100) * 100) / 100;
  return {
    type: "va_funding_fee", upfront_fee_percent: feePct, upfront_fee_amount,
    upfront_financed: true, annual_rate_percent: 0, monthly_amount: 0,
    duration_months: 0, duration_label: "N/A",
  };
}

// --- Conventional PMI (Private Mortgage Insurance) ---
// Placeholder BPMI rate matrix: FICO × LTV bands (annual % of loan amount)
// Based on industry-standard rate cards. TODO: Replace with MI provider API.
const PMI_RATE_MATRIX = [
  { minFico: 760, maxFico: 850, rates: { "85": 0.19, "90": 0.30, "95": 0.41, "97": 0.51 } },
  { minFico: 740, maxFico: 759, rates: { "85": 0.21, "90": 0.34, "95": 0.46, "97": 0.58 } },
  { minFico: 720, maxFico: 739, rates: { "85": 0.26, "90": 0.41, "95": 0.56, "97": 0.71 } },
  { minFico: 700, maxFico: 719, rates: { "85": 0.33, "90": 0.52, "95": 0.70, "97": 0.90 } },
  { minFico: 680, maxFico: 699, rates: { "85": 0.41, "90": 0.65, "95": 0.88, "97": 1.13 } },
  { minFico: 660, maxFico: 679, rates: { "85": 0.52, "90": 0.82, "95": 1.10, "97": 1.40 } },
  { minFico: 640, maxFico: 659, rates: { "85": 0.65, "90": 1.01, "95": 1.36, "97": 1.73 } },
  { minFico: 620, maxFico: 639, rates: { "85": 0.79, "90": 1.24, "95": 1.65, "97": 2.10 } },
];

function getPMIAnnualRate(ficoScore, ltvRatio) {
  if (ltvRatio <= 80) return 0;
  let ltvKey;
  if (ltvRatio <= 85) ltvKey = "85";
  else if (ltvRatio <= 90) ltvKey = "90";
  else if (ltvRatio <= 95) ltvKey = "95";
  else ltvKey = "97";
  for (const band of PMI_RATE_MATRIX) {
    if (ficoScore >= band.minFico && ficoScore <= band.maxFico) return band.rates[ltvKey] || 0;
  }
  if (ficoScore < 620) return PMI_RATE_MATRIX[PMI_RATE_MATRIX.length - 1].rates[ltvKey] || 0;
  return 0;
}

function estimatePMIDuration(loanAmount, propertyValue, noteRate, termMonths) {
  const targetBalance = propertyValue * 0.78;
  const mr = noteRate / 100 / 12;
  if (mr <= 0 || loanAmount <= targetBalance) return { months: 0, label: "Not required" };
  const pmt = loanAmount * (mr * Math.pow(1 + mr, termMonths)) / (Math.pow(1 + mr, termMonths) - 1);
  let bal = loanAmount, months = 0;
  while (bal > targetBalance && months < termMonths) {
    bal = bal - (pmt - bal * mr);
    months++;
  }
  const yrs = Math.floor(months / 12), rem = months % 12;
  const label = yrs > 0 ? (rem > 0 ? `~${yrs}yr ${rem}mo` : `~${yrs} years`) : `~${months} months`;
  return { months, label };
}

function calculateConventionalPMI(baseLoanAmount, propertyValue, ltvRatio, ficoScore, termMonths, noteRate) {
  if (ltvRatio <= 80) {
    return { type: "none", upfront_fee_percent: 0, upfront_fee_amount: 0, upfront_financed: false, annual_rate_percent: 0, monthly_amount: 0, duration_months: 0, duration_label: "N/A" };
  }
  const annual_rate_percent = getPMIAnnualRate(ficoScore, ltvRatio);
  const monthly_amount = Math.round((baseLoanAmount * (annual_rate_percent / 100)) / 12 * 100) / 100;
  const dur = estimatePMIDuration(baseLoanAmount, propertyValue, noteRate, termMonths);
  return {
    type: "conventional_pmi", upfront_fee_percent: 0, upfront_fee_amount: 0, upfront_financed: false,
    annual_rate_percent, monthly_amount, duration_months: dur.months, duration_label: dur.label,
  };
}

function calcGovInsurance(productCategory, baseLoanAmount, propertyValue, ltvRatio, termMonths, purpose, isFirstVAUse, isVAExempt, ficoScore, noteRate) {
  if (productCategory === "fha") return calculateFHAMIP(baseLoanAmount, ltvRatio, termMonths);
  if (productCategory === "va") return calculateVAFundingFee(baseLoanAmount, propertyValue, purpose, isFirstVAUse, isVAExempt);
  if (productCategory === "conventional" && ltvRatio > 80) return calculateConventionalPMI(baseLoanAmount, propertyValue, ltvRatio, ficoScore || 740, termMonths, noteRate || 7.0);
  return { type: "none", upfront_fee_percent: 0, upfront_fee_amount: 0, upfront_financed: false, annual_rate_percent: 0, monthly_amount: 0, duration_months: 0, duration_label: "N/A" };
}

// --- Loan Summary Calculator ---
// Computes the full borrower-facing cost breakdown for a single rate option.
// Maps to the format: Interest Rate → Lender Costs → Other Closing Costs → Down Payment → Cash to Close → Loan Amount → Monthly Payments
function calcLoanSummary(rateOption, scenario, opts) {
  const p = rateOption.pricing;
  const gi = p.government_insurance || { type: "none", upfront_fee_amount: 0, upfront_financed: false, monthly_amount: 0 };
  const feesIn = opts.fees_in || false;
  const origFee = opts.origination_fee || 0;
  const escrowAnnualRate = opts.escrow_annual_rate || 1.25;

  // --- Fees-in adjustment ---
  // When fees-in: origination fee is converted to points and subtracted from price
  // This effectively shifts the par rate up (rates look higher, but no separate fee line item)
  const origFeePoints = scenario.loan_amount > 0 ? (origFee / scenario.loan_amount) * 100 : 0;
  const adjustedFinalPrice = feesIn ? p.final_price_points - origFeePoints : p.final_price_points;

  // --- Cost of Interest Rate (discount points in dollars) ---
  // Below 100 = borrower pays points (cost), Above 100 = borrower gets credit
  const costOfRate = ((100 - adjustedFinalPrice) / 100) * scenario.loan_amount;

  // --- Cost of Mortgage Insurance (upfront, even if financed) ---
  const costOfMI = gi.upfront_fee_amount || 0;

  // --- Other Lender Costs (proc + UW) ---
  // Fees-out: shown as line item. Fees-in: $0 (already baked into price).
  const otherLenderCosts = feesIn ? 0 : origFee;

  // --- Total Lender Costs (or Credits) ---
  const totalLenderCosts = costOfRate + costOfMI + otherLenderCosts;

  // --- Other Closing Costs (unavoidable) --- placeholder 1.5%
  const otherClosingCosts = Math.round(scenario.loan_amount * 0.015);

  // --- Down Payment (purchase only) ---
  const downPayment = scenario.purpose === "purchase"
    ? Math.max(0, scenario.property_value - scenario.loan_amount)
    : 0;

  // --- Cash Required to Close ---
  // Total Lender Costs already includes credits as negative costOfRate
  const cashToClose = totalLenderCosts + otherClosingCosts + downPayment;

  // --- Loan Amount (debt) = total loan including financed MI ---
  const loanDebt = p.total_loan_amount || scenario.loan_amount;

  // --- Monthly Payment Breakdown ---
  const monthlyPI = p.monthly_pi;
  const monthlyMI = gi.monthly_amount || 0;
  const monthlyEscrow = Math.round((scenario.property_value * (escrowAnnualRate / 100)) / 12);
  const totalMonthly = monthlyPI + monthlyMI + monthlyEscrow;

  return {
    interest_rate: p.base_rate_percent,
    // Lender costs
    cost_of_rate: Math.round(costOfRate),
    cost_of_mi: Math.round(costOfMI * 100) / 100,
    other_lender_costs: Math.round(otherLenderCosts),
    total_lender_costs: Math.round(totalLenderCosts),
    // Closing costs
    other_closing_costs: otherClosingCosts,
    // Down payment & cash to close
    down_payment: downPayment,
    cash_to_close: Math.round(cashToClose),
    // Loan amount
    loan_debt: Math.round(loanDebt * 100) / 100,
    // Monthly payments
    monthly_pi: monthlyPI,
    monthly_mi: monthlyMI,
    monthly_escrow: monthlyEscrow,
    total_monthly: Math.round(totalMonthly * 100) / 100,
    // Meta
    fees_in: feesIn,
    adjusted_final_price: Math.round(adjustedFinalPrice * 10000) / 10000,
    gi_type: gi.type,
    gi_duration: gi.duration_label || "N/A",
  };
}

// --- Pricing math ---
function calculateComp(loanAmount, config) {
  if (!config.comp_percent) return { comp_dollars: 0, comp_points: 0 };
  let dollars = loanAmount * config.comp_percent;
  if (config.comp_floor_percent != null) dollars = Math.max(config.comp_floor_percent, dollars);
  if (config.comp_ceiling_percent != null) dollars = Math.min(config.comp_ceiling_percent, dollars);
  return { comp_dollars: dollars, comp_points: (dollars / loanAmount) * 100 };
}

function monthlyPI(amount, rate, months) {
  if (months <= 0 || amount <= 0) return 0;
  const r = rate / 100 / 12;
  if (r === 0) return Math.round((amount / months) * 100) / 100;
  const num = r * Math.pow(1 + r, months);
  const den = Math.pow(1 + r, months) - 1;
  return Math.round(amount * (num / den) * 100) / 100;
}

function calcAPR(loanAmount, ratePercent, pricePoints, termMonths) {
  if (termMonths <= 0 || loanAmount <= 0) return ratePercent;
  const pointsCost = ((100 - pricePoints) / 100) * loanAmount;
  const netPrincipal = loanAmount - pointsCost;
  if (netPrincipal <= 0) return ratePercent;

  const payment = monthlyPI(loanAmount, ratePercent, termMonths);
  let apr = ratePercent;

  for (let i = 0; i < 100; i++) {
    const mr = apr / 100 / 12;
    if (mr <= 0) { apr = 0.001; continue; }
    const factor = (Math.pow(1+mr, termMonths)-1) / (mr * Math.pow(1+mr, termMonths));
    const pv = payment * factor;
    const err = pv - netPrincipal;
    if (Math.abs(err) < 0.0001) break;

    const bump = 0.00001;
    const br = mr + bump;
    const bf = (Math.pow(1+br, termMonths)-1) / (br * Math.pow(1+br, termMonths));
    const bpv = payment * bf;
    const dpv = (bpv - pv) / bump / 1200;

    if (Math.abs(dpv) > 0.001) apr -= err / dpv;
    else apr += err > 0 ? 0.001 : -0.001;
    apr = Math.max(0.001, Math.min(30, apr));
  }
  return Math.round(apr * 10000) / 10000;
}

// --- Ranking ---
function rankResults(results) {
  const eligible = results.filter(r => r.eligibility.is_eligible);
  const ineligible = results.filter(r => !r.eligibility.is_eligible);

  const groups = new Map();
  for (const r of eligible) {
    const k = `${r.investor_code}::${r.product_code}`;
    if (!groups.has(k)) groups.set(k, []);
    groups.get(k).push(r);
  }

  for (const [, group] of groups) {
    group.sort((a, b) => a.pricing.base_rate_percent - b.pricing.base_rate_percent);
    let parIdx = 0, closest = Math.abs(group[0].pricing.final_price_points - 100);
    for (let i = 1; i < group.length; i++) {
      const d = Math.abs(group[i].pricing.final_price_points - 100);
      if (d < closest) { closest = d; parIdx = i; }
    }
    for (let i = 0; i < group.length; i++) {
      const fp = group[i].pricing.final_price_points;
      if (i === parIdx) { group[i].is_par_rate = true; group[i].rate_option = "par"; }
      else if (fp < 100) { group[i].is_par_rate = false; group[i].rate_option = "below_par"; }
      else { group[i].is_par_rate = false; group[i].rate_option = "above_par"; }
    }
    group.sort((a, b) => a.pricing.apr - b.pricing.apr);
    group.forEach((r, i) => { r.product_rank = i + 1; });
  }

  eligible.sort((a, b) => a.pricing.apr - b.pricing.apr);
  eligible.forEach((r, i) => { r.rank = i + 1; });
  ineligible.forEach(r => { r.rank = 0; r.product_rank = 0; r.is_par_rate = false; r.rate_option = "below_par"; });
  return [...eligible, ...ineligible];
}

// =============================================
// SUPABASE QUERIES
// =============================================

async function runPricing(client, scenario) {
  const start = Date.now();
  const errors = [];
  const results = [];

  // Get all investors
  const { data: investors, error: invErr } = await client.from("investors").select("id, name, code, channel");
  if (invErr) throw new Error(`Investors query failed: ${invErr.message}. Check that you are using the service_role key (not anon key) to bypass RLS.`);
  if (!investors || investors.length === 0) {
    errors.push("No investors found. This usually means RLS is blocking reads — make sure you are using the service_role key, not the anon key.");
  }

  for (const inv of (investors || [])) {
    try {
      // Active rate sheets
      const { data: sheets } = await client.from("rate_sheets")
        .select("id, investor_id, effective_date, version, status")
        .eq("investor_id", inv.id).eq("status", "active")
        .order("effective_date", { ascending: false });
      if (!sheets?.length) { errors.push(`No active rate sheet: ${inv.code}`); continue; }

      // Config
      const { data: config } = await client.from("investor_configs")
        .select("*").eq("investor_id", inv.id).eq("channel", inv.channel).limit(1).single();
      if (!config) { errors.push(`No config: ${inv.code}`); continue; }

      // Products
      const { data: products } = await client.from("investor_products")
        .select(`id, investor_id, product_id, investor_product_code, channel, is_available,
          min_fico, max_ltv_ratio, max_cltv_ratio, max_dti_ratio, state_availability, state_exclusions,
          products(id, name, code, category, lien_position, amortization, term_months)`)
        .eq("investor_id", inv.id).eq("channel", inv.channel).eq("is_available", true);
      if (!products?.length) { errors.push(`No products: ${inv.code}`); continue; }

      // Load all rate data across all sheets
      let allBaseRates = [], allMatrices = [];
      for (const sheet of sheets) {
        const [brRes, mRes] = await Promise.all([
          client.from("base_rates").select("id, rate_sheet_id, product_id, investor_product_code, term_months, lock_period_days, rate_percent, price_points").eq("rate_sheet_id", sheet.id),
          client.from("llpa_matrices").select("id, rate_sheet_id, name, matrix_type, dimension_1_name, dimension_1_type, dimension_2_name, dimension_2_type, applies_to_product_categories, notes").eq("rate_sheet_id", sheet.id),
        ]);
        if (brRes.data) allBaseRates.push(...brRes.data);
        if (mRes.data) allMatrices.push(...mRes.data);
      }

      // Load entries in chunks
      const matrixIds = allMatrices.map(m => m.id);
      let allEntries = [];
      for (let i = 0; i < matrixIds.length; i += 30) {
        const chunk = matrixIds.slice(i, i + 30);
        const { data: entries } = await client.from("llpa_entries")
          .select("id, matrix_id, dimension_1_min, dimension_1_max, dimension_1_label, dimension_1_exact_values, dimension_2_min, dimension_2_max, dimension_2_label, adjustment_bps, adjustment_price_points")
          .in("matrix_id", chunk);
        if (entries) allEntries.push(...entries);
      }

      const comp = calculateComp(scenario.loan_amount, config);

      // Price each product
      for (const ip of products) {
        const product = ip.products;
        if (!product) continue;

        const elig = checkEligibility(scenario, ip, product.category);

        // Non-QM products: enforce minimum 45-day lock period
        const isNQM = (product.category || '').toLowerCase().startsWith('nqm') || (product.code || '').toUpperCase().startsWith('NQM');
        const effectiveLockDays = isNQM ? Math.max(scenario.lock_days, 45) : scenario.lock_days;

        // Find base rates
        let rates = allBaseRates
          .filter(r => r.product_id === product.id && r.term_months === scenario.term_months && r.lock_period_days === effectiveLockDays)
          .sort((a, b) => a.rate_percent - b.rate_percent);

        if (!rates.length && scenario.term_months !== product.term_months) {
          rates = allBaseRates
            .filter(r => r.product_id === product.id && r.term_months === product.term_months && r.lock_period_days === effectiveLockDays)
            .sort((a, b) => a.rate_percent - b.rate_percent);
        }

        if (!rates.length) {
          if (elig.is_eligible) errors.push(`No base rate: ${product.code} @ ${scenario.term_months}mo/${effectiveLockDays}d`);
          if (!elig.is_eligible) {
            results.push({
              rank: 0, product_rank: 0, investor_code: inv.code, investor_name: inv.name,
              product_code: product.code, product_name: product.name, product_category: product.category,
              term_months: scenario.term_months, rate_sheet_date: sheets[0].effective_date,
              rate_option: "below_par", is_par_rate: false,
              eligibility: elig, pricing: null, llpa_breakdown: [],
            });
          }
          continue;
        }

        const llpaResult = applyLLPAs(allMatrices, allEntries, scenario, product.category);

        // Calculate mortgage insurance once per product (FHA MIP, VA Fee, or conventional PMI)
        const representativeRate = rates.length > 0 ? rates[Math.floor(rates.length / 2)].rate_percent : 7.0;
        const govIns = calcGovInsurance(
          product.category, scenario.loan_amount, scenario.property_value,
          scenario.ltv_ratio, rates[0].term_months, scenario.purpose,
          scenario.is_first_va_use ?? true, scenario.is_va_funding_fee_exempt ?? false,
          scenario.fico_score, representativeRate
        );

        for (const br of rates) {
          const fp = br.price_points + llpaResult.total_points;
          // Total loan amount includes financed upfront fee
          const totalLoan = govIns.upfront_financed ? scenario.loan_amount + govIns.upfront_fee_amount : scenario.loan_amount;
          // P&I calculated on total loan amount
          const pi = monthlyPI(totalLoan, br.rate_percent, br.term_months);
          // Total monthly = P&I + monthly MI
          const totalMonthly = pi + govIns.monthly_amount;
          // APR on total loan amount
          const apr = calcAPR(totalLoan, br.rate_percent, fp, br.term_months);

          results.push({
            rank: 0, product_rank: 0, investor_code: inv.code, investor_name: inv.name,
            product_code: product.code, product_name: product.name, product_category: product.category,
            term_months: br.term_months, rate_sheet_date: sheets[0].effective_date,
            rate_option: "par", is_par_rate: false,
            eligibility: elig,
            pricing: {
              base_rate_percent: br.rate_percent, base_price_points: br.price_points,
              total_llpa_points: llpaResult.total_points, comp_dollars: comp.comp_dollars,
              comp_points: comp.comp_points, final_price_points: fp,
              final_rate_percent: br.rate_percent, apr, monthly_pi: pi,
              estimated_closing_costs: Math.round(scenario.loan_amount * 0.015),
              government_insurance: govIns,
              total_loan_amount: totalLoan,
              total_monthly_payment: totalMonthly,
            },
            llpa_breakdown: llpaResult.details,
          });
        }
      }
    } catch (e) {
      errors.push(`${inv.code}: ${e.message}`);
    }
  }

  const ranked = rankResults(results);
  return {
    results: ranked, errors,
    meta: {
      execution_ms: Date.now() - start,
      investors_queried: investors?.length || 0,
      total_rate_options: ranked.filter(r => r.eligibility.is_eligible && r.pricing).length,
      products_eligible: new Set(ranked.filter(r => r.eligibility.is_eligible && r.pricing).map(r => r.product_code)).size,
      products_ineligible: new Set(ranked.filter(r => !r.eligibility.is_eligible).map(r => r.product_code)).size,
    },
  };
}

// --- Loan Summary Display Component ---

    return `$${v.toLocaleString()}`;
  };
  const fmtC = (v) => `$${v.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2})}`;
  const isCredit = summary.total_lender_costs < 0;

  return (
    <div style={{padding:'8px 16px 12px', fontSize:12, background:'rgba(56,189,248,0.03)', borderBottom:'1px solid var(--bg3)'}}>
      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'0 24px', maxWidth:520}}>
        {/* Left column: Costs */}
        <div>
          <div style={{fontWeight:600, color:'var(--accent)', fontSize:11, textTransform:'uppercase', marginBottom:4}}>
            Costs & Cash to Close
          </div>
          <div style={{display:'flex', justifyContent:'space-between', padding:'1px 0'}}>
            <span style={{color:'var(--text2)'}}>Interest Rate</span>
            <span style={{fontWeight:700, color:'var(--accent)'}}>{summary.interest_rate.toFixed(3)}%</span>
          </div>
          <div style={{borderTop:'1px solid var(--bg3)', margin:'3px 0'}} />
          <div style={{display:'flex', justifyContent:'space-between', padding:'1px 0'}}>
            <span style={{color:'var(--text2)'}}>Cost of Interest Rate</span>

              {fmt(summary.cost_of_rate)}
            </span>
          </div>
          {summary.cost_of_mi > 0 && (
            <div style={{display:'flex', justifyContent:'space-between', padding:'1px 0'}}>
              <span style={{color:'var(--text2)'}}>
                {summary.gi_type === 'fha_mip' ? 'UFMIP' : summary.gi_type === 'va_funding_fee' ? 'VA Funding Fee' : 'MI Cost'}
                {' '}<span style={{color:'var(--text3)', fontSize:10}}>(financed)</span>
              </span>
              <span style={{fontStyle:'italic'}}>{fmt(Math.round(summary.cost_of_mi))}</span>
            </div>

            <span style={{color:'var(--text2)'}}>Other Lender Costs{summary.fees_in ? ' (in rate)' : ' (proc+UW)'}</span>

          </div>
          <div style={{borderTop:'1px solid var(--bg3)', margin:'3px 0'}} />
          <div style={{display:'flex', justifyContent:'space-between', padding:'1px 0'}}>
